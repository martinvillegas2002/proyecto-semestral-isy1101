name: Deploy to ECS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag y push a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Construimos usando la ruta específica de tu estructura de carpetas
          docker build -t $ECR_REGISTRY/frontend-despacho:latest "./proyecto semestral/front_despacho"
          docker push $ECR_REGISTRY/frontend-despacho:latest

      - name: Deploy a ECS
        run: |
          
          aws ecs update-service --cluster "proyecto-cluster" --service "task-frontend-despacho-service-ornnu1kn" --force-new-deployment
